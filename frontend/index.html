<!DOCTYPE html>
<html>
<head>
    <title>Task Estimation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h2>AI Task Estimation System</h2>

    <form id="taskForm">
        <input type="text" id="task_name" placeholder="Task Name" required>

        <input type="number" id="expected_time" placeholder="Expected Time (hours)" required>

        <input type="number" id="actual_time" placeholder="Actual Time (hours)" required>

        <button type="submit">Add Task</button>
    </form>

    <p id="responseMsg"></p>
</div>

<script src="script.js"></script>

</body>
</html>
